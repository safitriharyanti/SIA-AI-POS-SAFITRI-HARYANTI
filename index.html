<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard AI POS</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 250px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, button {
      padding: 10px;
      width: 90%;
      margin-top: 10px;
    }

    button {
      background: blue;
      color: white;
      border: none;
      cursor: pointer;
    }

    canvas {
      margin-top: 30px;
    }
  </style>
</head>

<body>

<h1>📊 Dashboard AI POS</h1>

<div class="container">

  <div class="card">
    <h3>Input Penjualan</h3>
    <input type="number" id="input" placeholder="Masukkan penjualan">
    <button onclick="tambahData()">Tambah</button>
  </div>

  <div class="card">
    <h3>Total Penjualan</h3>
    <p id="total">0</p>
  </div>

</div>

<canvas id="chart" width="400" height="200"></canvas>

<script>
  let dataPenjualan = [];
  let total = 0;

  const ctx = document.getElementById('chart').getContext('2d');

  const chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: [],
      datasets: [{
        label: 'Penjualan',
        data: [],
        borderWidth: 1
      }]
    }
  });

  function tambahData() {
    const val = parseInt(document.getElementById("input").value);

    if (!val) return alert("Masukkan angka!");

    dataPenjualan.push(val);
    total += val;

    document.getElementById("total").innerText = total;

    chart.data.labels.push("Data " + dataPenjualan.length);
    chart.data.datasets[0].data.push(val);
    chart.update();
  }
</script>

</body>
</html>
