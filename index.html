<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>AI POS Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: Arial; margin: 0; background: #f4f6f9; }
    header { background: #1e293b; color: white; padding: 15px; text-align: center; }

    .container { padding: 20px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    input, button {
      padding: 10px;
      width: 100%;
      margin-top: 10px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

    .delete {
      background: red;
      color: white;
      border: none;
      padding: 5px;
      cursor: pointer;
    }

    .ai-box {
      background: #eef2ff;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>🛒 AI POS Dashboard</header>

<div class="container">

  <!-- INPUT PRODUK -->
  <div class="card">
    <h3>Tambah Produk</h3>
    <input type="text" id="nama" placeholder="Nama produk">
    <input type="number" id="harga" placeholder="Harga">
    <button onclick="tambah()">Tambah</button>
  </div>

  <!-- KPI -->
  <div class="grid">
    <div class="card">
      <h3>Total Penjualan</h3>
      <p id="total">0</p>
    </div>

    <div class="card">
      <h3>Jumlah Produk</h3>
      <p id="jumlah">0</p>
    </div>

    <div class="card">
      <h3>Rata-rata Harga</h3>
      <p id="rata">0</p>
    </div>
  </div>

  <!-- CHART -->
  <div class="card">
    <h3>Grafik Penjualan</h3>
    <canvas id="chart"></canvas>
  </div>

  <!-- TABEL -->
  <div class="card">
    <h3>Daftar Produk</h3>
    <table>
      <thead>
        <tr>
          <th>No</th>
          <th>Nama</th>
          <th>Harga</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <!-- AI ANALISIS -->
  <div class="ai-box">
    <h3>🤖 AI Analisis</h3>
    <p id="aiText">Klik tombol untuk analisis...</p>
    <button onclick="analisisAI()">Analisis Sekarang</button>
  </div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("produk")) || [];

const ctx = document.getElementById("chart").getContext("2d");

const chart = new Chart(ctx, {
  type: "bar",
  data: {
    labels: [],
    datasets: [{
      label: "Harga Produk",
      data: []
    }]
  }
});

function render() {
  let total = data.reduce((a,b)=>a+b.harga,0);
  let jumlah = data.length;
  let rata = jumlah ? (total/jumlah).toFixed(2) : 0;

  document.getElementById("total").innerText = total;
  document.getElementById("jumlah").innerText = jumlah;
  document.getElementById("rata").innerText = rata;

  chart.data.labels = data.map(d=>d.nama);
  chart.data.datasets[0].data = data.map(d=>d.harga);
  chart.update();

  let tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  data.forEach((d,i)=>{
    tbody.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${d.nama}</td>
        <td>${d.harga}</td>
        <td><button class="delete" onclick="hapus(${i})">X</button></td>
      </tr>
    `;
  });

  localStorage.setItem("produk", JSON.stringify(data));
}

function tambah(){
  let nama = document.getElementById("nama").value;
  let harga = parseInt(document.getElementById("harga").value);

  if(!nama || !harga) return alert("Isi semua data!");

  data.push({nama, harga});
  document.getElementById("nama").value="";
  document.getElementById("harga").value="";
  render();
}

function hapus(i){
  data.splice(i,1);
  render();
}

// 🤖 AI ANALISIS (SIMULASI CERDAS)
function analisisAI(){
  if(data.length === 0){
    document.getElementById("aiText").innerText = "Belum ada data.";
    return;
  }

  let total = data.reduce((a,b)=>a+b.harga,0);
  let rata = total / data.length;

  let insight = "";

  if(rata > 50000){
    insight = "Produk cenderung mahal. Fokus ke premium market.";
  } else {
    insight = "Produk relatif terjangkau. Cocok untuk pasar massal.";
  }

  let max = data.reduce((a,b)=> a.harga>b.harga ? a : b);

  document.getElementById("aiText").innerText =
    `Total penjualan: ${total}. 
Produk termahal: ${max.nama}.
Insight: ${insight}`;
}

render();
</script>

</body>
</html>
