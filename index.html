<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard AI POS</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 20px;
      text-align: center;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, button {
      padding: 10px;
      width: 80%;
      margin-top: 10px;
    }

    button {
      background: blue;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>📊 Dashboard AI POS</h1>

  <div class="card">
    <input type="number" id="input" placeholder="Masukkan penjualan">
    <button onclick="proses()">Proses</button>
  </div>

  <div class="card">
    <h3>Hasil</h3>
    <p id="output">-</p>
  </div>

  <script>
    function proses() {
      const val = document.getElementById("input").value;
      document.getElementById("output").innerText =
        "Total: " + (val * 1.1);
    }
  </script>

</body>
</html>
